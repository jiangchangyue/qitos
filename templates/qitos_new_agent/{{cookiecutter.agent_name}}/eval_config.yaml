# {{cookiecutter.agent_name}} evaluation configuration for Snowl

agent:
  name: {{cookiecutter.agent_name}}
  factory: qitos_zoo.{{cookiecutter.agent_name}}.snowl_compat.create_snowl_agent
  required_tools: []
  required_env: {}

benchmarks: {}

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true

defaults:
  model: {{cookiecutter.default_model}}
  max_steps: {{cookiecutter.max_steps}}
  temperature: 0.0
