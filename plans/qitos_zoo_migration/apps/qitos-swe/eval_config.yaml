# qitos_swe evaluation configuration for Snowl

agent:
  name: qitos_swe
  factory: qitos_zoo.qitos_swe.snowl_compat.create_snowl_agent
  required_tools:
    - shell
    - file_read
    - file_write
    - file_edit
  required_env:
    type: repo
    capabilities:
      - filesystem
      - command

benchmarks:
  swe_bench:
    dataset: princeton-nlp/SWE-bench_Lite
    split: test
    max_steps: 25
    eval_metric: resolved
    patch_format: git_diff
    timeout: 600

  bfcl:
    dataset: gorilla-llm/Berkeley-Function-Calling-Leaderboard
    split: test
    max_steps: 15
    eval_metric: accuracy

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true

defaults:
  model: Qwen/Qwen3-8B
  max_steps: 25
  temperature: 0.0
