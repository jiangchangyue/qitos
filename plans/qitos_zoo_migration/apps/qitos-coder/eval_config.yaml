# qitos_coder evaluation configuration for Snowl
#
# Supports SWE-Bench and BFCL benchmarks.

agent:
  name: qitos_coder
  factory: qitos_zoo.qitos_coder.snowl_compat.create_snowl_agent
  required_tools:
    - shell
    - file_read
    - file_write
  required_env:
    type: host
    capabilities:
      - filesystem
      - command

benchmarks:
  swe_bench:
    dataset: princeton-nlp/SWE-bench_Lite
    split: test
    max_steps: 50
    eval_metric: resolved
    patch_format: git_diff
    timeout: 600

  bfcl:
    dataset: gorilla-llm/Berkeley-Function-Calling-Leaderboard
    split: test
    max_steps: 15
    eval_metric: accuracy
    categories:
      - simple
      - multiple
      - parallel
      - parallel_multiple

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true

defaults:
  model: null  # Uses family preset resolution
  permission_mode: default
  temperature: 0.0
