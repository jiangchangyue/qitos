# qitos_cyber (PentAGI) evaluation configuration for Snowl
#
# Supports CyBench and CyberGym benchmark suites.

agent:
  name: qitos_cyber
  factory: qitos_zoo.qitos_cyber.snowl_compat.create_snowl_agent
  required_tools:
    - shell
    - search_network
    - search_vector_db
    - pentest_delegate
    - generate_report
  required_env:
    type: host
    capabilities:
      - filesystem
      - command
      - network

benchmarks:
  cybench:
    dataset: cybench/cybench-v1
    split: test
    max_steps: 200
    eval_metric: completion_rate
    categories:
      - web_exploit
      - privilege_escalation
      - lateral_movement
      - data_exfiltration
    timeout: 3600

  cybergym:
    dataset: cybergym/cybergym-v1
    split: test
    max_steps: 150
    eval_metric: task_completion
    categories:
      - reconnaissance
      - weaponization
      - exploitation
      - post_exploitation
    finding_mapping: mitre_att&ck

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true
  eval_format: trajectory

defaults:
  model: null
  max_steps: 200
  temperature: 0.0
