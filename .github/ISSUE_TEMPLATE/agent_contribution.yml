name: Agent Contribution
description: Contribute a new agent application to QitOS Zoo
labels: ["contribution", "zoo"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing an agent to QitOS Zoo!
        Please fill out the following information to help us review your contribution.

  - type: input
    id: agent-name
    attributes:
      label: Agent Name
      description: Name of the agent (e.g., qitos_researcher, qitos_analyst)
      placeholder: qitos_<name>
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this agent do? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: model-family
    attributes:
      label: Primary Model Family
      description: Which model family does this agent primarily target?
      options:
        - Qwen (通义千问)
        - GLM (智谱)
        - DeepSeek
        - MiniMax
        - Kimi (月之暗面)
        - OpenAI
        - Other / Multi-family
    validations:
      required: true

  - type: textarea
    id: tools-needed
    attributes:
      label: Tools Required
      description: What tools does this agent need? (e.g., shell, file_read, web_search)
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Contribution Checklist
      options:
        - label: Agent follows the standard directory structure
        - label: snowl_compat.py is implemented
        - label: eval_config.yaml is provided
        - label: Unit tests are included
        - label: No cross-app imports from other zoo apps
        - label: Critic uses @critic decorator where applicable

  - type: textarea
    id: additional
    attributes:
      label: Additional Notes
      description: Any additional context or special requirements?
    validations:
      required: false
