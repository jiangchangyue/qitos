name: contribution-test

on:
  pull_request:
    paths:
      - 'qitos/kit/tool/**'
      - 'qitos/kit/parser/**'
      - 'qitos/kit/critic/**'
      - 'qitos/kit/embedding/**'
      - 'qitos/protocols.py'
      - 'qitos/core/**'

jobs:
  tool-schema-check:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files.*.filename, 'kit/tool')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate tool schemas
        run: |
          python -c "
          from qitos.core.tool_registry import ToolRegistry
          from qitos.core.tool_schema import ToolSpec
          import importlib, pkgutil, inspect
          import qitos.kit.tool as pkg
          errors = []
          for _, name, _ in pkgutil.walk_packages(pkg.__path__, pkg.__name__ + '.'):
              mod = importlib.import_module(name)
              for attr_name in dir(mod):
                  attr = getattr(mod, attr_name)
                  if isinstance(attr, ToolSpec):
                      if not attr.name or not attr.parameters:
                          errors.append(f'{name}.{attr_name}: invalid ToolSpec')
          if errors:
              raise ValueError('Tool schema issues:\\n' + '\\n'.join(errors))
          print('All tool schemas valid')
          "

  parser-contract-check:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files.*.filename, 'kit/parser') || contains(github.event.pull_request.changed_files.*.filename, 'protocols.py')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check parser contract_id uniqueness
        run: |
          python -c "
          from qitos.protocols import list_protocols
          ids = [p for p in list_protocols()]
          if len(ids) != len(set(ids)):
              dupes = [i for i in ids if ids.count(i) > 1]
              raise ValueError(f'Duplicate protocol IDs: {set(dupes)}')
          print(f'All {len(ids)} protocol IDs are unique')
          "

  affected-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,models]"

      - name: Run affected test subsets
        run: |
          # Run tests for each changed area
          CHANGED="${{ github.event.pull_request.changed_files }}"
          pytest tests/core/ tests/engine/ tests/kit/ -q --tb=short 2>/dev/null || true
          pytest -q --tb=short

  critic-test:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files.*.filename, 'kit/critic') || contains(github.event.pull_request.changed_files.*.filename, 'critic_decorator')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run critic tests
        run: pytest tests/engine/test_critic_decorator.py tests/kit/ -q --tb=short
