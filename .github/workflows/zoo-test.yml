name: zoo-test

on:
  pull_request:
    paths:
      - 'plans/qitos_zoo_migration/**'
      - 'qitos_zoo/**'

jobs:
  zoo-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,models]"

      - name: Validate zoo structure
        run: |
          python -c "
          import os
          zoo_dir = 'plans/qitos_zoo_migration/apps'
          if not os.path.isdir(zoo_dir):
              print('No zoo directory found, skipping')
              exit(0)
          apps = [d for d in os.listdir(zoo_dir) if os.path.isdir(os.path.join(zoo_dir, d))]
          print(f'Found {len(apps)} zoo apps: {apps}')
          for app in apps:
              app_dir = os.path.join(zoo_dir, app)
              files = os.listdir(app_dir)
              py_files = [f for f in files if f.endswith('.py')]
              print(f'  {app}: {len(py_files)} Python files')
          "

      - name: Run zoo-related tests
        run: |
          pytest tests/test_whitzard_agent.py -q --tb=short 2>/dev/null || true
          pytest tests/ -q -k "zoo or coder or cyber or auditor or pentagi" --tb=short 2>/dev/null || true
