# qitos_researcher evaluation configuration for Snowl

agent:
  name: qitos_researcher
  factory: qitos_zoo.qitos_researcher.snowl_compat.create_snowl_agent
  required_tools:
    - http_get
    - extract_web_text
    - file_read
    - file_write
  required_env:
    type: host
    capabilities:
      - filesystem
      - network

benchmarks:
  osworld:
    dataset: os-world/OSWorld
    split: test
    max_steps: 20
    eval_metric: task_completion
    categories:
      - web_navigation
      - information_extraction
      - report_generation
    timeout: 300

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true

defaults:
  model: qwen-plus
  max_steps: 20
  temperature: 0.0
