# qitos_auditor (Whitzard) evaluation configuration for Snowl
#
# Supports CyberGym and OWASP benchmark suites.

agent:
  name: qitos_auditor
  factory: qitos_zoo.qitos_auditor.snowl_compat.create_snowl_agent
  required_tools:
    - shell
    - file_read
    - file_write
    - security_audit
    - report
  required_env:
    type: host
    capabilities:
      - filesystem
      - command
      - network

benchmarks:
  cybergym:
    dataset: cybergym/cybergym-v1
    split: test
    max_steps: 300
    eval_metric: finding_coverage
    categories:
      - injection
      - auth_bypass
      - data_leak
      - misconfiguration
    finding_mapping: owasp_top10

  owasp:
    dataset: owasp/benchmark-v1.2
    split: test
    max_steps: 200
    eval_metric: true_positive_rate
    categories:
      - A01_broken_access_control
      - A02_cryptographic_failures
      - A03_injection
      - A04_insecure_design
      - A05_security_misconfiguration
      - A06_vulnerable_components
      - A07_auth_failures
      - A08_data_integrity
      - A09_logging_failures
      - A10_ssrp

serialization:
  format: runstate_json
  schema_version: "1.0"
  round_trip: true
  finding_mapping: owasp_top10

defaults:
  model: null
  max_steps: 300
  temperature: 0.0
