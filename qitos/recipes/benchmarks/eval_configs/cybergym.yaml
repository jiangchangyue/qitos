benchmark: cybergym
display_name: CyberGym
description: "Interactive cybersecurity gym — networked challenge environments with progressive difficulty"

splits:
  - beginner
  - intermediate
  - advanced

defaults:
  model: gpt-4o
  max_steps: 30
  max_tokens: 500_000
  temperature: 0.2
  retry_budget: 3

scorer: flag_match

tools:
  - bash

notes: >
  CyberGym provides interactive challenge environments accessed through a
  remote server. Each task requires network interaction and shell access.
  The server URL must be specified via the `server` parameter.
